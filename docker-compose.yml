services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: helps-near-app
    restart: unless-stopped
    env_file:
      - .env.production
    
    environment:
      - DATABASE_URL=postgresql://neondb_owner:npg_dXTkIj4h6aeM@ep-tiny-butterfly-an8beyi6.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
    ports:
      - "5000:5000"
    volumes:
      - helps-near-backend-volume:/app/data
    networks:
      - helps-near-net

  nginx:
    image: nginx:alpine
    container_name: helps-near-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - helps-near-net

networks:
  helps-near-net:
    driver: bridge

volumes:
  helps-near-backend-volume:
